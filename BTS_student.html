<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTS — اختيار المراكز</title>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  background: linear-gradient(135deg, #1a4731 0%, #276749 100%);
  min-height: 100vh;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 24px 16px;
}
.card {
  background: white; border-radius: 20px;
  width: 100%; max-width: 600px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.25); overflow: hidden;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #1a4731, #276749);
  color: white; padding: 24px; text-align: center;
}
.header h1 { font-size: 24px; font-weight: 700; }
.header .student-name {
  font-size: 18px; font-weight: 600; margin-top: 8px;
  background: rgba(255,255,255,0.15); border-radius: 10px;
  padding: 6px 16px; display: inline-block;
}
.header p { font-size: 13px; margin-top: 6px; opacity: 0.85; }

/* ── Pre-confirmed section ── */
.pre-section {
  background: #fffbeb; border-bottom: 2px solid #f6ad55;
  padding: 14px 20px;
}
.pre-section-title {
  font-size: 13px; font-weight: 700; color: #b7791f; margin-bottom: 10px;
}
.pre-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 10px;
  background: white; border: 1.5px solid #fbd38d;
  margin-bottom: 6px;
}
.pre-item:last-child { margin-bottom: 0; }
.pre-badge {
  min-width: 28px; height: 28px; border-radius: 50%;
  background: #f6ad55; color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.pre-item-info { flex: 1; }
.pre-specialty { font-size: 13px; font-weight: 700; color: #744210; }
.pre-institution { font-size: 11px; color: #b7791f; margin-top: 2px; }

/* ── Progress bar ── */
.progress-wrap {
  background: #f0fff4; border-bottom: 2px solid #c6f6d5;
  padding: 14px 20px;
}
.progress-top {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; font-weight: 700; color: #276749; margin-bottom: 8px;
}
.progress-track {
  background: #c6f6d5; border-radius: 99px; height: 10px; overflow: hidden;
}
.progress-fill {
  background: linear-gradient(90deg, #276749, #38a169);
  height: 100%; border-radius: 99px;
  transition: width 0.35s ease; width: 0%;
}
.progress-done {
  margin-top: 10px; padding: 8px 12px;
  background: white; border: 2px solid #38a169; border-radius: 10px;
  font-size: 13px; font-weight: 700; color: #276749;
  text-align: center; display: none;
}

/* ── School list ── */
.list-wrap { padding: 16px 20px; }
.list-header {
  font-size: 12px; font-weight: 700; color: #aaa;
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 10px; text-align: center;
}

.school-card {
  display: flex; align-items: center; gap: 12px;
  border: 2px solid #e2e8f0; border-radius: 14px;
  padding: 12px 14px; margin-bottom: 8px;
  background: #f7fafc; cursor: pointer;
  transition: all 0.2s; user-select: none;
}
.school-card:active { transform: scale(0.98); }
.school-card.selected {
  background: #f0fff4; border-color: #68d391;
}
.school-card.locked {
  opacity: 0.45; cursor: not-allowed;
}

.card-num {
  min-width: 34px; height: 34px; border-radius: 50%;
  background: #e2e8f0; color: #718096;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 13px; flex-shrink: 0;
  transition: all 0.2s;
}
.school-card.selected .card-num {
  background: linear-gradient(135deg, #276749, #38a169);
  color: white;
}

.card-info { flex: 1; min-width: 0; }
.card-specialty {
  font-size: 14px; font-weight: 700; color: #1a4731;
  line-height: 1.3;
}
.school-card.selected .card-specialty { color: #276749; }
.card-sub {
  font-size: 12px; color: #718096; margin-top: 3px; line-height: 1.4;
}
.card-sub span { display: inline-block; margin-left: 8px; }

.card-check {
  min-width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px solid #e2e8f0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
  transition: all 0.2s; color: transparent;
}
.school-card.selected .card-check {
  background: #38a169; border-color: #38a169; color: white;
}

/* ── Buttons ── */
.btn-wrap { padding: 0 20px 20px; }
.btn-confirm {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, #1a4731, #276749);
  color: white; border: none; border-radius: 12px;
  font-size: 17px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 14px rgba(39,103,73,.35);
  transition: opacity 0.2s, transform 0.1s;
  display: none; margin-bottom: 10px;
}
.btn-confirm:hover { opacity: 0.92; }
.btn-confirm:active { transform: scale(0.98); }
.btn-reset {
  width: 100%; padding: 11px;
  background: #fff5f5; color: #c53030;
  border: 2px solid #fed7d7; border-radius: 10px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: background 0.2s;
}
.btn-reset:hover { background: #fed7d7; }

/* ── Result box ── */
.result-box {
  display: none; margin: 0 20px 20px;
  background: #f0fff4; border: 2px solid #68d391;
  border-radius: 14px; padding: 18px;
}
.result-box h3 { color: #276749; font-size: 15px; margin-bottom: 14px; text-align: center; }
.result-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid #c6f6d5;
}
.result-item:last-child { border-bottom: none; }
.result-dot {
  min-width: 10px; height: 10px; border-radius: 50%;
  background: #38a169; margin-top: 5px; flex-shrink: 0;
}
.result-item-info { flex: 1; }
.result-specialty { font-size: 14px; font-weight: 700; color: #1a4731; }
.result-sub { font-size: 12px; color: #718096; margin-top: 2px; }
.btn-pdf {
  width: 100%; padding: 13px;
  background: #276749; color: white;
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  margin-top: 14px; transition: opacity 0.2s;
}
.btn-pdf:hover { opacity: 0.88; }

/* ── Error page ── */
.error-page { text-align: center; padding: 60px 24px; color: #c53030; }
.error-page h2 { font-size: 22px; margin-bottom: 12px; }
.error-page p { font-size: 14px; color: #718096; line-height: 1.7; }

/* ── Print ── */
@media print {
  body { background: white; padding: 0; }
  .card { box-shadow: none; border-radius: 0; max-width: 100%; }
  .progress-wrap, .list-wrap, .btn-wrap, .btn-reset, .btn-pdf { display: none !important; }
  .result-box { display: block !important; border: none; margin: 0; }
  .pre-section { display: block !important; }
}
</style>
</head>
<body>
<div class="card" id="mainCard"></div>

<script>
// ── Decompression ─────────────────────────────────────────────────────────────
function decodeParam(str) {
  if (!str) return '';
  try {
    var lz = LZString.decompressFromEncodedURIComponent(str);
    if (lz && lz.length > 0) return lz;
  } catch(e) {}
  try {
    var s = str.replace(/-/g, '+').replace(/_/g, '/');
    while (s.length % 4) s += '=';
    return decodeURIComponent(escape(atob(s)));
  } catch(e) {}
  try { return decodeURIComponent(str); } catch(e) { return str; }
}

function getParam(name) {
  var q = window.location.search.replace(/^\?/, '');
  var parts = q.split('&');
  for (var i = 0; i < parts.length; i++) {
    var eq = parts[i].indexOf('=');
    if (eq < 0) continue;
    try {
      var k = decodeURIComponent(parts[i].substring(0, eq));
      var v = parts[i].substring(eq + 1); // raw — decompression handles encoding
      if (k === name) return v;
    } catch(e) {}
  }
  return '';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Parse label → {specialty, school, city} ──────────────────────────────────
function parseLabel(label) {
  var parts = label.split(' — ');
  var specialty = (parts[0] || label).trim();
  var fullInst  = (parts[1] || '').trim();
  var instParts = fullInst.split(' - ');
  var city      = instParts.length > 1 ? instParts[0].trim() : '';
  var school    = instParts.length > 1 ? instParts.slice(1).join(' - ').trim() : fullInst;
  return { specialty: specialty, school: school, city: city, full: fullInst };
}

// ── Read URL params ──────────────────────────────────────────────────────────
var studentName = decodeParam(getParam('n')) || '';
// name is percent-encoded normally
try { studentName = decodeURIComponent(getParam('n')); } catch(e) {}

var MAX        = parseInt(decodeParam(getParam('max')) || getParam('max'), 10) || 6;
var schools    = decodeParam(getParam('s')).split('|').map(function(s){ return s.trim(); }).filter(Boolean);
var preSchools = decodeParam(getParam('pre')).split('|').map(function(s){ return s.trim(); }).filter(Boolean);

var root = document.getElementById('mainCard');

if (!studentName || schools.length < 2) {
  root.innerHTML =
    '<div class="error-page"><h2>❌ رابط غير صحيح</h2>' +
    '<p>Lien invalide<br>يرجى التواصل مع المسؤول / Contactez votre responsable</p></div>';
} else {
  buildPage();
}

// ── Build page ───────────────────────────────────────────────────────────────
function buildPage() {
  var n = schools.length;
  var selected = {}; // idx → true

  function countSelected() {
    return Object.keys(selected).filter(function(k){ return selected[k]; }).length;
  }

  function toggle(idx) {
    var cnt = countSelected();
    if (selected[idx]) {
      delete selected[idx];
    } else {
      if (cnt >= MAX) return; // locked
      selected[idx] = true;
    }
    render();
  }

  function render() {
    var cnt    = countSelected();
    var maxHit = cnt >= MAX;

    // Progress
    document.getElementById('progressFill').style.width = Math.round(cnt / MAX * 100) + '%';
    document.getElementById('progressCount').textContent = cnt + ' / ' + MAX;
    document.getElementById('progressDone').style.display = maxHit ? 'block' : 'none';

    // Rebuild cards
    var list = document.getElementById('schoolList');
    list.innerHTML = '';
    schools.forEach(function(label, idx) {
      var isSel    = !!selected[idx];
      var isLocked = !isSel && maxHit;
      var p        = parseLabel(label);

      var card = document.createElement('div');
      card.className = 'school-card' + (isSel ? ' selected' : '') + (isLocked ? ' locked' : '');

      var num = document.createElement('div');
      num.className = 'card-num';
      num.textContent = idx + 1;

      var info = document.createElement('div');
      info.className = 'card-info';
      info.innerHTML =
        '<div class="card-specialty">' + esc(p.specialty) + '</div>' +
        '<div class="card-sub">' +
          (p.school ? '<span>🏫 ' + esc(p.school) + '</span>' : '') +
          (p.city   ? '<span>📍 ' + esc(p.city)   + '</span>' : '') +
        '</div>';

      var chk = document.createElement('div');
      chk.className = 'card-check';
      chk.textContent = '✓';

      card.appendChild(num);
      card.appendChild(info);
      card.appendChild(chk);

      if (!isLocked) {
        (function(i){ card.addEventListener('click', function(){ toggle(i); }); })(idx);
      }
      list.appendChild(card);
    });

    // Confirm button
    document.getElementById('btnConfirm').style.display = (cnt === MAX) ? 'block' : 'none';
  }

  // ── Initial HTML ─────────────────────────────────────────────────────────
  var preHtml = '';
  if (preSchools.length > 0) {
    preHtml = '<div class="pre-section">' +
      '<div class="pre-section-title">⚠️ المراكز المحددة مسبقاً من طرف BTS — لا تحتاج إلى ترتيب :<br>' +
      '<span style="font-size:11px;font-weight:400">Centres déjà cochés automatiquement par BTS — pas besoin de les classer</span></div>';
    preSchools.forEach(function(s) {
      var p = parseLabel(s);
      preHtml +=
        '<div class="pre-item">' +
          '<div class="pre-badge">✓</div>' +
          '<div class="pre-item-info">' +
            '<div class="pre-specialty">' + esc(p.specialty) + '</div>' +
            (p.full ? '<div class="pre-institution">🏫 ' + esc(p.full) + '</div>' : '') +
          '</div>' +
        '</div>';
    });
    preHtml += '</div>';
  }

  root.innerHTML =
    '<div class="header">' +
      '<h1>🎓 BTS</h1>' +
      '<div class="student-name">' + esc(studentName) + '</div>' +
      '<p>اختر ' + MAX + ' مراكز &nbsp;|&nbsp; Choisissez ' + MAX + ' centres</p>' +
    '</div>' +
    preHtml +
    '<div class="progress-wrap">' +
      '<div class="progress-top">' +
        '<span>📊 التقدم / Progression</span>' +
        '<span id="progressCount">0 / ' + MAX + '</span>' +
      '</div>' +
      '<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>' +
      '<div class="progress-done" id="progressDone">' +
        '✅ تم اختيار ' + MAX + ' مراكز — انقر تأكيد / ' + MAX + ' centres choisis — cliquez Confirmer' +
      '</div>' +
    '</div>' +
    '<div class="list-wrap">' +
      '<div class="list-header">المراكز المتاحة / Centres disponibles (' + n + ')</div>' +
      '<div id="schoolList"></div>' +
    '</div>' +
    '<div class="btn-wrap">' +
      '<button class="btn-confirm" id="btnConfirm" onclick="confirmChoices()">✅ تأكيد الاختيارات / Confirmer les choix</button>' +
      '<button class="btn-reset" onclick="resetAll()">🔄 إعادة التعيين / Réinitialiser</button>' +
    '</div>' +
    '<div class="result-box" id="resultBox">' +
      '<h3>✅ اختياراتك النهائية / Vos centres choisis :</h3>' +
      '<div id="resultList"></div>' +
      '<button class="btn-pdf" onclick="downloadPdf()">📄 تحميل PDF / Télécharger PDF</button>' +
    '</div>';

  render();

  // ── Confirm ───────────────────────────────────────────────────────────────
  window.confirmChoices = function() {
    if (countSelected() < MAX) return;
    if (!confirm('هل أنت متأكد من اختياراتك؟ / Confirmez-vous vos choix ?')) return;

    var chosen = schools.filter(function(_, i){ return !!selected[i]; });
    var listEl = document.getElementById('resultList');
    listEl.innerHTML = '';
    chosen.forEach(function(label) {
      var p = parseLabel(label);
      var item = document.createElement('div');
      item.className = 'result-item';
      item.innerHTML =
        '<div class="result-dot"></div>' +
        '<div class="result-item-info">' +
          '<div class="result-specialty">' + esc(p.specialty) + '</div>' +
          (p.full ? '<div class="result-sub">🏫 ' + esc(p.full) + '</div>' : '') +
        '</div>';
      listEl.appendChild(item);
    });

    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
  };

  // ── Reset ─────────────────────────────────────────────────────────────────
  window.resetAll = function() {
    if (!confirm('هل تريد إعادة تعيين جميع الاختيارات؟ / Réinitialiser tous les choix ?')) return;
    selected = {};
    document.getElementById('resultBox').style.display = 'none';
    render();
  };

  // ── PDF ───────────────────────────────────────────────────────────────────
  window.downloadPdf = function() {
    var chosen = schools.filter(function(_, i){ return !!selected[i]; });

    var preRows = preSchools.map(function(s) {
      var p = parseLabel(s);
      return '<tr><td style="padding:8px 12px;text-align:center;color:#b7791f;">✓</td>' +
             '<td style="padding:8px 12px;font-weight:700;">' + esc(p.specialty) + '</td>' +
             '<td style="padding:8px 12px;color:#718096;">' + esc(p.full) + '</td></tr>';
    }).join('');

    var chosenRows = chosen.map(function(s) {
      var p = parseLabel(s);
      return '<tr><td style="padding:8px 12px;text-align:center;">✅</td>' +
             '<td style="padding:8px 12px;font-weight:700;">' + esc(p.specialty) + '</td>' +
             '<td style="padding:8px 12px;color:#718096;">' + esc(p.full) + '</td></tr>';
    }).join('');

    var preSect = preSchools.length > 0 ?
      '<h3 style="color:#b7791f;margin:24px 0 8px">⚠️ محددة مسبقاً من طرف BTS</h3>' +
      '<table style="border:2px solid #f6ad55"><thead><tr>' +
      '<th style="background:#f6ad55;color:white;padding:8px;width:50px">الحالة</th>' +
      '<th style="background:#f6ad55;color:white;padding:8px">الشعبة</th>' +
      '<th style="background:#f6ad55;color:white;padding:8px">المؤسسة</th>' +
      '</tr></thead><tbody>' + preRows + '</tbody></table>' : '';

    var win = window.open('', '_blank');
    win.document.write(
      '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
      '<title>BTS — ' + esc(studentName) + '</title>' +
      '<style>body{font-family:Arial,sans-serif;padding:30px;direction:rtl;}' +
      'h2{color:#276749;text-align:center;margin-bottom:4px;}' +
      '.sub{text-align:center;color:#718096;font-size:13px;margin-bottom:20px;}' +
      'table{width:100%;border-collapse:collapse;margin-top:4px;}' +
      'th{background:#276749;color:white;padding:10px;}' +
      'tr:nth-child(even){background:#f0fff4;}' +
      'td{border-bottom:1px solid #c6f6d5;}' +
      '.footer{text-align:center;margin-top:30px;font-size:11px;color:#aaa;}' +
      '</style></head><body>' +
      '<h2>🎓 BTS — اختيار المراكز</h2>' +
      '<div class="sub">' + esc(studentName) + ' &nbsp;|&nbsp; ' + new Date().toLocaleDateString('fr-MA') + '</div>' +
      '<table style="border:2px solid #276749"><thead><tr>' +
      '<th style="width:50px">الحالة</th><th>الشعبة</th><th>المؤسسة</th>' +
      '</tr></thead><tbody>' + chosenRows + '</tbody></table>' +
      preSect +
      '<div class="footer">Document généré via BTS Massar Tool</div>' +
      '</body></html>'
    );
    win.document.close();
    setTimeout(function(){ win.print(); }, 400);
  };
}
</script>
</body>
</html>
