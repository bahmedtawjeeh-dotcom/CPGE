<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CPGE — ترتيب الاختيارات</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#553c9a,#6b46c1);min-height:100vh;padding:14px;}
.card{background:#fff;border-radius:20px;max-width:520px;margin:0 auto;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.25);}
.hdr{background:linear-gradient(135deg,#44337a,#6b46c1);color:#fff;padding:22px 18px;text-align:center;}
.hdr .badge{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:3px 12px;font-size:11px;margin-bottom:8px;letter-spacing:1px;}
.hdr h1{font-size:18px;font-weight:700;margin-bottom:6px;}
.hdr .nm{font-size:22px;font-weight:700;padding:7px 16px;background:rgba(255,255,255,.15);border-radius:10px;display:inline-block;margin:6px 0;}
.hdr p{font-size:12px;opacity:.8;margin-top:4px;}
.instr{background:#faf5ff;border-bottom:2px solid #d6bcfa;padding:12px 16px;font-size:13px;color:#44337a;line-height:1.6;}
.progress-bar{background:#e9d8fd;height:8px;}
.progress-fill{background:linear-gradient(90deg,#6b46c1,#9f7aea);height:8px;width:0%;transition:width .4s ease;border-radius:0 4px 4px 0;}
.progress-text{text-align:center;font-size:12px;color:#6b46c1;padding:6px;font-weight:600;}
.list{padding:14px;}
.item{display:flex;align-items:center;gap:10px;background:#f7fafc;border:2px solid #e2e8f0;border-radius:12px;padding:12px 14px;margin-bottom:10px;transition:border-color .2s,background .2s;}
.item.ranked{border-color:#9f7aea;background:#faf5ff;}
.item.ranked .school-name{color:#44337a;}
.school-name{flex:1;font-size:14px;color:#2d3748;font-weight:600;line-height:1.4;}
.rank-select{flex-shrink:0;width:90px;padding:8px 6px;border:2px solid #d6bcfa;border-radius:9px;font-size:15px;font-weight:700;color:#6b46c1;background:#faf5ff;outline:none;cursor:pointer;text-align:center;appearance:none;-webkit-appearance:none;font-family:inherit;transition:border-color .2s,box-shadow .2s;}
.rank-select:focus{border-color:#6b46c1;box-shadow:0 0 0 3px rgba(107,70,193,.2);}
.rank-select.unset{color:#aaa;border-color:#e2e8f0;background:#f7fafc;font-weight:400;font-size:12px;}
.rank-badge{flex-shrink:0;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#6b46c1,#44337a);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;opacity:0;transition:opacity .3s;}
.item.ranked .rank-badge{opacity:1;}
.footer{padding:0 14px 18px;}
.all-done{display:none;}
.all-done .congrats{background:#faf5ff;border:2px solid #d6bcfa;border-radius:12px;padding:14px;text-align:center;font-size:13px;color:#44337a;margin-bottom:12px;}
.btn-ok{width:100%;padding:15px;background:linear-gradient(135deg,#38a169,#276749);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(56,161,105,.35);transition:opacity .2s;}
.btn-ok:hover{opacity:.9;}
.result{display:none;margin-top:14px;background:#f0fff4;border:2px solid #9ae6b4;border-radius:14px;padding:16px;}
.result h3{color:#276749;font-size:14px;margin-bottom:10px;}
.rtxt{background:#fff;border:1.5px solid #c6f6d5;border-radius:10px;padding:14px;font-size:13px;color:#2d3748;line-height:2;white-space:pre-wrap;margin-bottom:12px;word-break:break-word;}
.btn-pdf{width:100%;padding:12px;background:#276749;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.btn-pdf:hover{opacity:.88;}
.btn-reset{width:100%;padding:11px;background:#fff;color:#c53030;border:2px solid #fed7d7;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:10px;}
.btn-reset:hover{background:#fff5f5;border-color:#fc8181;}
.error-page{text-align:center;padding:60px 20px;color:#fff;}
.error-page h2{font-size:24px;margin-bottom:12px;}
.error-page p{font-size:14px;opacity:.85;}
</style>
</head>
<body>
<div id="app"></div>
<script>
var params = new URLSearchParams(window.location.search);
var studentName = (params.get('n') || '').trim();
var schoolsParam = params.get('s') || '';
var schools = schoolsParam
  ? schoolsParam.split('|').map(function(s){ return s.trim(); }).filter(Boolean)
  : [];

if (!studentName || schools.length < 2) {
  document.getElementById('app').innerHTML =
    '<div class="error-page">' +
    '<h2>❌ رابط غير صحيح</h2>' +
    '<p>Lien invalide<br>يرجى التواصل مع المسؤول / Contactez votre responsable</p>' +
    '</div>';
} else {
  buildPage(studentName, schools);
}

function buildPage(name, items) {
  var n = items.length;
  var assigned = {};

  var html =
    '<div class="card">' +
    '<div class="hdr">' +
    '<div class="badge">🎓 CPGE MASSAR</div>' +
    '<h1>ترتيب الاختيارات — Classement des choix</h1>' +
    '<div class="nm">' + esc(name) + '</div>' +
    '<p>اختر رتبة لكل مركز — لا يمكن تكرار نفس الرتبة<br>Choisissez un rang pour chaque centre — aucun doublon possible</p>' +
    '</div>' +
    '<div class="instr">🔢 <strong>اختر رتبة</strong> لكل مركز — عند اختيار رتبة تختفي من باقي القوائم<br>🔢 <strong>Choisissez un rang</strong> pour chaque centre — il disparaît automatiquement des autres</div>' +
    '<div class="progress-bar"><div class="progress-fill" id="pbar"></div></div>' +
    '<div class="progress-text" id="ptxt">0 / ' + n + ' &nbsp;—&nbsp; لم يتم ترتيب أي مركز بعد / Aucun centre classé</div>' +
    '<div class="list" id="list"></div>' +
    '<div class="footer">' +
    '<div class="all-done" id="allDone">' +
    '<div class="congrats">🎉 <strong>أحسنت! تم ترتيب جميع المراكز</strong><br><span style="font-size:12px;color:#805ad5">Bravo ! Tous les centres ont été classés</span></div>' +
    '<button class="btn-ok" onclick="doConfirm()">✅ &nbsp; تأكيد الترتيب &nbsp;|&nbsp; Confirmer le classement</button>' +
    '</div>' +
    '<div class="result" id="result">' +
    '<h3>✅ ترتيبك النهائي — Votre classement final :</h3>' +
    '<div class="rtxt" id="rtxt"></div>' +
    '<button class="btn-pdf" onclick="downloadPDF()">⬇️ &nbsp; تحميل PDF وإرساله &nbsp;|&nbsp; Télécharger en PDF et envoyer</button>' +
    '</div>' +
    '<button class="btn-reset" onclick="doReset()">🔄 &nbsp; إعادة التعيين &nbsp;|&nbsp; Réinitialiser</button>' +
    '</div></div>';

  document.getElementById('app').innerHTML = html;
  render();

  function getUsed() {
    var u = {};
    for (var k in assigned) if (assigned[k]) u[assigned[k]] = true;
    return u;
  }

  function render() {
    var list = document.getElementById('list');
    list.innerHTML = '';
    var used = getUsed();
    var ranked = [], unranked = [];
    for (var ii = 0; ii < items.length; ii++) {
      if (assigned[ii]) ranked.push(ii); else unranked.push(ii);
    }
    ranked.sort(function(a,b){ return assigned[a] - assigned[b]; });
    var order = ranked.concat(unranked);

    order.forEach(function(i) {
      var myRank = assigned[i] || null;
      var d = document.createElement('div');
      d.className = 'item' + (myRank ? ' ranked' : '');
      var opts = '<option value="">-- اختر / Choisir --</option>';
      for (var r = 1; r <= n; r++) {
        if (!used[r] || r === myRank) {
          opts += '<option value="' + r + '"' + (r === myRank ? ' selected' : '') + '>' + r + '</option>';
        }
      }
      d.innerHTML =
        '<div class="rank-badge">' + (myRank || '') + '</div>' +
        '<div class="school-name">' + esc(items[i]) + '</div>' +
        '<select class="rank-select ' + (myRank ? '' : 'unset') + '" data-idx="' + i + '">' + opts + '</select>';
      list.appendChild(d);
    });

    list.querySelectorAll('select').forEach(function(sel) {
      sel.addEventListener('change', function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var val = parseInt(this.value) || null;
        if (val) assigned[idx] = val; else delete assigned[idx];
        render();
      });
    });

    var done = Object.keys(assigned).length;
    var pct = Math.round(done / n * 100);
    document.getElementById('pbar').style.width = pct + '%';
    if (done === 0) {
      document.getElementById('ptxt').textContent = '0 / ' + n + '  —  لم يتم ترتيب أي مركز بعد / Aucun centre classé';
    } else if (done < n) {
      document.getElementById('ptxt').textContent = done + ' / ' + n + '  —  تبقى ' + (n - done) + ' / Reste ' + (n - done);
    } else {
      document.getElementById('ptxt').textContent = '✅ ' + n + ' / ' + n + '  —  اكتمل الترتيب / Classement complet !';
    }
    document.getElementById('allDone').style.display = (done === n) ? 'block' : 'none';
    document.getElementById('result').style.display = 'none';
  }

  window.doConfirm = function() {
    var pairs = [];
    for (var k in assigned) pairs.push({rank: assigned[k], school: items[parseInt(k)]});
    pairs.sort(function(a,b){ return a.rank - b.rank; });
    var t = 'الاسم / Nom : ' + name + '\n\nالترتيب النهائي / Classement final :\n─────────────────────\n';
    pairs.forEach(function(p){ t += p.rank + '. ' + p.school + '\n'; });
    document.getElementById('rtxt').textContent = t;
    var r = document.getElementById('result');
    r.style.display = 'block';
    r.scrollIntoView({behavior: 'smooth'});
  };

  window.doReset = function() {
    if (!confirm('إعادة التعيين؟ سيتم حذف كل الترتيبات\nRéinitialiser ? Tous les rangs seront effacés.')) return;
    assigned = {};
    render();
  };

  window.downloadPDF = function() {
    var pairs = [];
    for (var k in assigned) pairs.push({rank: assigned[k], school: items[parseInt(k)]});
    pairs.sort(function(a,b){ return a.rank - b.rank; });
    var today = new Date();
    var dateStr = today.getDate() + '/' + (today.getMonth()+1) + '/' + today.getFullYear();
    var rows = '';
    pairs.forEach(function(p) {
      rows += '<tr><td style="width:50px;text-align:center;font-size:18px;font-weight:700;color:#6b46c1;">' + p.rank + '</td><td style="font-size:14px;padding:10px 8px;color:#2d3748;">' + esc(p.school) + '</td></tr>';
    });
    var w = window.open('', '_blank');
    w.document.write(
      '<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>CPGE — ' + esc(name) + '</title>' +
      '<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:"Segoe UI",Tahoma,Arial,sans-serif;padding:30px;color:#1a1a2e;background:#fff;}' +
      '@media print{@page{margin:1.2cm;size:A4;}body{padding:0;}.no-print{display:none!important;}}' +
      '.header{text-align:center;border-bottom:3px solid #6b46c1;padding-bottom:18px;margin-bottom:24px;}' +
      '.logo{font-size:22px;font-weight:800;color:#6b46c1;letter-spacing:1px;}' +
      '.subtitle{font-size:13px;color:#888;margin-top:4px;}' +
      '.name-box{margin:20px auto;background:#faf5ff;border:2px solid #d6bcfa;border-radius:12px;padding:14px 20px;max-width:400px;text-align:center;}' +
      '.name-label{font-size:12px;color:#805ad5;margin-bottom:4px;}' +
      '.name-val{font-size:22px;font-weight:700;color:#44337a;}' +
      'table{width:100%;border-collapse:collapse;border:2px solid #e9d8fd;border-radius:10px;overflow:hidden;margin-top:10px;}' +
      'thead tr{background:#6b46c1;color:#fff;}thead td{padding:10px 8px;font-size:13px;font-weight:700;}' +
      'tbody tr:nth-child(even){background:#faf5ff;}tbody tr td{border-bottom:1px solid #e9d8fd;}' +
      '.footer-box{margin-top:32px;display:flex;justify-content:space-between;align-items:flex-end;font-size:12px;color:#888;border-top:1px dashed #ccc;padding-top:14px;}' +
      '.sign-box{text-align:center;}.sign-line{width:180px;border-bottom:1px solid #aaa;margin:0 auto 6px;}' +
      '.btn-print{display:block;margin:20px auto 0;padding:12px 32px;background:#6b46c1;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}' +
      '</style></head><body>' +
      '<div class="header"><div class="logo">🎓 CPGE MASSAR</div><div class="subtitle">وثيقة ترتيب الاختيارات — Fiche de classement des choix</div></div>' +
      '<div class="name-box"><div class="name-label">اسم الطالب / Nom de l\'élève</div><div class="name-val">' + esc(name) + '</div></div>' +
      '<table><thead><tr><td style="text-align:center;">الرتبة / Rang</td><td>المركز / Centre</td></tr></thead><tbody>' + rows + '</tbody></table>' +
      '<div class="footer-box"><div>📅 ' + dateStr + '</div><div class="sign-box"><div class="sign-line"></div><div>توقيع المسؤول / Signature du responsable</div></div></div>' +
      '<button class="btn-print no-print" onclick="window.print()">🖨️ &nbsp; طباعة / تحميل PDF &nbsp;|&nbsp; Imprimer / Enregistrer PDF</button>' +
      '</body></html>'
    );
    w.document.close();
    w.focus();
    setTimeout(function(){ w.print(); }, 600);
  };
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
